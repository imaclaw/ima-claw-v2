<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#0C0C12">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>登录 - Ima Claw</title>
<link rel="stylesheet" href="../assets/css/variables.css?v=8">
<link rel="stylesheet" href="../assets/css/nav.css?v=8">
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--surface-2:#1a1a24;--border:#222;--border-hover:#333;--text:#e8e8e8;--text-2:#a0a0a0;--text-3:#666;--lobster:#e74c3c;--lobster-light:#ff6b5b;--gold:#f2c744;--green:#2ecc71;--blue:#3498db}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}

/* Nav */


/* Auth Layout */
.auth-page{flex:1;display:flex;align-items:center;justify-content:center;padding:100px 20px 60px;position:relative;overflow:hidden}
.auth-page::before{content:'';position:absolute;top:-30%;left:-20%;width:140%;height:140%;background:radial-gradient(circle at 30% 40%,rgba(231,76,60,0.06) 0%,transparent 50%);pointer-events:none}
.auth-page::after{content:'';position:absolute;bottom:-30%;right:-20%;width:100%;height:100%;background:radial-gradient(circle at 70% 70%,rgba(242,199,68,0.03) 0%,transparent 50%);pointer-events:none}

.auth-container{display:flex;max-width:960px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:24px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.4);position:relative;z-index:1}

/* Left panel - branding */
.auth-brand{flex:1;padding:60px 48px;display:flex;flex-direction:column;justify-content:center;align-items:center;background:linear-gradient(135deg,rgba(231,76,60,0.08) 0%,rgba(242,199,68,0.04) 100%);border-right:1px solid var(--border);text-align:center;position:relative;overflow:hidden}
.auth-brand::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;background:radial-gradient(circle,rgba(231,76,60,0.1) 0%,transparent 70%);pointer-events:none}
.brand-lobster{width:180px;height:180px;animation:float 3s ease-in-out infinite;margin-bottom:24px;position:relative;z-index:1}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-12px) rotate(-3deg)}75%{transform:translateY(-6px) rotate(2deg)}}
.brand-title{font-size:28px;font-weight:900;background:linear-gradient(135deg,#ff6b5b,#f2c744);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;position:relative;z-index:1}
.brand-desc{color:var(--text-2);font-size:14px;line-height:1.6;max-width:280px;position:relative;z-index:1}
.brand-features{margin-top:32px;text-align:left;position:relative;z-index:1}
.brand-feat{display:flex;align-items:center;gap:10px;color:var(--text-2);font-size:13px;margin-bottom:12px}
.brand-feat .icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.feat-1 .icon{background:rgba(231,76,60,0.15)}
.feat-2 .icon{background:rgba(242,199,68,0.15)}
.feat-3 .icon{background:rgba(46,204,113,0.15)}

/* Right panel - form */
.auth-form-panel{flex:1;padding:48px;display:flex;flex-direction:column;justify-content:center}
.auth-tabs{display:flex;gap:0;margin-bottom:32px;background:var(--surface-2);border-radius:12px;padding:4px;border:1px solid var(--border)}
.auth-tab{flex:1;padding:10px 20px;text-align:center;font-size:14px;font-weight:600;color:var(--text-3);cursor:pointer;border-radius:10px;transition:all .2s;border:none;background:none}
.auth-tab.active{background:var(--lobster);color:#fff}
.auth-tab:hover:not(.active){color:var(--text)}

.form-group{margin-bottom:20px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:8px}
.form-input{width:100%;padding:12px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--lobster)}
.form-input::placeholder{color:var(--text-3)}

.form-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.form-check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-2);cursor:pointer}
.form-check input{accent-color:var(--lobster)}
.form-link{font-size:13px;color:var(--lobster-light)}
.form-link:hover{text-decoration:underline}

.btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,var(--lobster),#c0392b);color:#fff;font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer;transition:all .3s;margin-bottom:20px}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(231,76,60,0.3)}

.divider{display:flex;align-items:center;gap:16px;margin-bottom:20px;color:var(--text-3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.social-btns{display:flex;gap:12px;margin-bottom:24px}
.btn-social{flex:1;padding:11px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text-2);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-social:hover{border-color:var(--border-hover);color:var(--text)}
.btn-social svg{width:18px;height:18px}

.auth-switch{text-align:center;font-size:13px;color:var(--text-3)}
.auth-switch a{color:var(--lobster-light);font-weight:600}
.auth-switch a:hover{text-decoration:underline}

/* Terms */
.terms{text-align:center;font-size:11px;color:var(--text-3);margin-top:16px;line-height:1.5}
.terms a{color:var(--text-2)}

/* Mobile */
@media(max-width:768px){
  .auth-container{flex-direction:column;max-width:440px}
  .auth-brand{padding:40px 32px 32px;border-right:none;border-bottom:1px solid var(--border)}
  .brand-lobster{width:120px;height:120px}
  .brand-title{font-size:22px}
  .brand-features{display:none}
  .auth-form-panel{padding:32px 24px}
}

/* Register form extras */
.form-group.hidden{display:none}
.password-strength{height:3px;border-radius:2px;background:var(--border);margin-top:8px;overflow:hidden}
.password-strength-bar{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
</style>
</head>
<body>

<nav>
  <a href="../" class="logo"><img src="../logo-nav.png" alt="Ima Claw logo"><div class="logo-text">Ima<b>Claw</b> <span style="font-size:11px;color:var(--text-3);font-weight:400;margin-left:6px">by ImaStudio</span></div></a>
</nav>

<div class="auth-page">
<div class="auth-container">

  <!-- Left: Brand -->
  <div class="auth-brand">
    <img src="../adopt/baby-lobster.png" class="brand-lobster" alt="Claw">
    <div class="brand-title">领养你的 AI 龙虾</div>
    <div class="brand-desc">3 分钟完成注册，开启 AI 创作之旅</div>
    <div class="brand-features">
      <div class="brand-feat feat-1"><div class="icon">🎨</div><span>图片 · 视频 · 音乐，全能创作</span></div>
      <div class="brand-feat feat-2"><div class="icon">🤖</div><span>接入任意 AI 模型，自由选择</span></div>
      <div class="brand-feat feat-3"><div class="icon">💬</div><span>飞书 · Telegram · WhatsApp 随处可用</span></div>
    </div>
  </div>

  <!-- Right: Form -->
  <div class="auth-form-panel">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">登录</button>
      <button class="auth-tab" onclick="switchTab('register')">注册</button>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">邮箱</label>
        <input type="email" class="form-input" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" placeholder="输入密码" required>
      </div>
      <div class="form-row">
        <label class="form-check"><input type="checkbox" checked> 记住我</label>
        <a href="#" class="form-link">忘记密码？</a>
      </div>
      <button type="submit" class="btn-submit">登录</button>
    </form>

    <form id="registerForm" style="display:none">
      <div class="form-group">
        <label class="form-label">邮箱</label>
        <input type="email" class="form-input" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" placeholder="至少 8 位" required id="regPassword" oninput="checkStrength(this.value)">
        <div class="password-strength"><div class="password-strength-bar" id="strengthBar"></div></div>
      </div>
      <div class="form-group">
        <label class="form-label">确认密码</label>
        <input type="password" class="form-input" placeholder="再次输入密码" required>
      </div>
      <button type="submit" class="btn-submit">创建账号</button>
      <div class="terms">注册即表示同意 <a href="#">服务条款</a> 和 <a href="#">隐私政策</a></div>
    </form>

    <div class="divider">或</div>

    <div class="social-btns">
      <button class="btn-social" type="button">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google
      </button>
      <button class="btn-social" type="button">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        GitHub
      </button>
    </div>

    <div class="auth-switch" id="switchLogin">还没有账号？<a href="#" onclick="switchTab('register');return false">立即注册</a></div>
    <div class="auth-switch" id="switchRegister" style="display:none">已有账号？<a href="#" onclick="switchTab('login');return false">去登录</a></div>
  </div>

</div>
</div>

<script>
function switchTab(tab) {
  var tabs = document.querySelectorAll('.auth-tab');
  tabs[0].classList.toggle('active', tab === 'login');
  tabs[1].classList.toggle('active', tab === 'register');
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('switchLogin').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('switchRegister').style.display = tab === 'register' ? 'block' : 'none';
}

function checkStrength(pw) {
  var bar = document.getElementById('strengthBar');
  var score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  var widths = ['0%', '25%', '50%', '75%', '100%'];
  var colors = ['', '#e74c3c', '#f39c12', '#f2c744', '#2ecc71'];
  bar.style.width = widths[score];
  bar.style.background = colors[score];
}

// Prevent form submission (prototype)
document.querySelectorAll('form').forEach(function(f) {
  f.addEventListener('submit', function(e) {
    e.preventDefault();
    alert('原型演示 - 后端尚未接入');
  });
});
</script>

<script src="../i18n/core.js?v=8"></script>
<script src="../assets/js/nav.js?v=8"></script>
</body>
</html>
